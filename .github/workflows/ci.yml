name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            xvfb \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            mesa-utils \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev

      - name: Configure
        run: cmake --preset debug -DGLFW_BUILD_WAYLAND=OFF

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: xvfb-run ctest --test-dir build/debug --output-on-failure
